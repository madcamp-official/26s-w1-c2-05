# /etc/nginx/sites-available/linguaai
# 도메인 연결 후 certbot이 이 파일을 자동으로 443/SSL 블록으로 확장해줍니다.
# 아래 example.com은 실제 도메인으로 교체하세요.

server {
    listen 80;
    server_name example.com www.example.com;

    root /var/www/linguaai/frontend/dist;
    index index.html;

    # 백엔드로 보낼 경로들 (frontend/vite.config.js의 proxy 목록과 동일하게 유지)
    location ~ ^/(auth|onboarding|vocabulary|flashcard|grammar|answerlog|users|dialogue|dialoguelog|dashboard)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 나머지는 React SPA (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
